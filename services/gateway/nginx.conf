upstream auth_service {
    server auth-service:8001;
}

upstream cuti_service {
    server cuti-service:8002;
}

server {
    listen 80;
    server_name localhost;

    # Auth Service routes
    location /auth/ {
        proxy_pass http://auth_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Auth Service metrics
    location = /auth/metrics {
        proxy_pass http://auth_service/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Item service health lives at /health (not /items/health)
    location = /items/health {
        proxy_pass http://cuti_service/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Item service metrics
    location = /items/metrics {
        proxy_pass http://cuti_service/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Preserve /items/* paths for item-service routes
    location /items {
        proxy_pass http://cuti_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Health check aggregator
    location /health {
        default_type application/json;
        return 200 '{"status": "healthy", "service": "gateway"}';
    }

    # Frontend (static files — container listens on port 80)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
