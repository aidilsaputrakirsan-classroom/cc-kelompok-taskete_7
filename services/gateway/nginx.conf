# Rate limiting zones (Modul 15 Security Hardening)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

upstream auth_service {
    server auth-service:8001;
}

upstream cuti_service {
    server cuti-service:8002;
}

upstream backend_monolith {
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;

    # Custom error page untuk rate limit
    error_page 429 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"error": "Too many requests. Please try again later."}';
    }

    # =====================================================
    # Microservices Health & Metrics (untuk StatusPage)
    # =====================================================
    location = /auth/health {
        proxy_pass http://auth_service/health;
        proxy_set_header Host $host;
    }

    location = /auth/metrics {
        proxy_pass http://auth_service/metrics;
        proxy_set_header Host $host;
    }

    location = /items/health {
        proxy_pass http://cuti_service/health;
        proxy_set_header Host $host;
    }

    location = /items/metrics {
        proxy_pass http://cuti_service/metrics;
        proxy_set_header Host $host;
    }

    # =====================================================
    # Auth Routes (Diarahkan ke Monolith agar Data Role sinkron)
    # =====================================================
    location /auth/login {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://backend_monolith/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    location /auth/register {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://backend_monolith/auth/register;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /auth/ {
        limit_req zone=general_limit burst=20 nodelay;
        proxy_pass http://backend_monolith/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # =====================================================
    # Microservice Items (tetap ke cuti-service)
    # =====================================================
    location /items {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://cuti_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # =====================================================
    # Main Cuti / Leaves Core (Diarahkan ke Monolith)
    # =====================================================
    location /leaves {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://backend_monolith;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    location /holidays {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://backend_monolith;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    location /analytics {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://backend_monolith;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    location /dashboard {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://backend_monolith;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Health check aggregator
    location /health {
        default_type application/json;
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
        return 200 '{"status": "healthy", "service": "gateway"}';
    }

    # Gateway metrics
    location /metrics {
        default_type application/json;
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
        return 200 '{"service": "gateway", "total_requests": $connection, "total_errors": 0, "latency": {"avg_ms": 2, "p95_ms": 6}, "error_rate_percent": 0.0, "uptime_seconds": 86400}';
    }

    # Frontend (static files — container listens on port 80)
    location / {
        limit_req zone=general_limit burst=50 nodelay;
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
