# ==============================================
# CI Pipeline — cc-kelompok-taskete_7
# ==============================================
# Pipeline ini berjalan otomatis saat:
# - Push ke branch main
# - Pull Request ke branch main
#
# Jobs:
# 1. test-backend: Install deps + run pytest
# 2. test-frontend: Install deps + run vitest
# 3. build-docker: Build Docker images (validasi Dockerfile)
#
# Catatan:
# - Backend butuh DATABASE_URL saat import app, jadi diset SQLite untuk CI.
# - Frontend tests saat ini stabil di Node 20 pada GitHub Actions.

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ================================
  # JOB 1: Test Backend (Python/FastAPI)
  # ================================
  test-backend:
    name: "🐍 Test Backend"
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./test.db

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "📦 Cache pip packages"
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: "📥 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "🧪 Run tests with coverage"
        run: pytest

  # ================================
  # JOB 2: Test Frontend (React/Vitest)
  # ================================
  test-frontend:
    name: "⚛️ Test Frontend"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: "📥 Install dependencies"
        run: npm ci

      - name: "🧪 Run tests"
        run: npm test

      - name: "🏗️ Build frontend"
        run: npm run build

  # ================================
  # JOB 3: Build Docker Images
  # ================================
  build-docker:
    name: "🐳 Build Docker"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend] # Hanya jalan jika kedua test PASS

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🐳 Build backend image"
        run: docker build -t cloudapp-backend:ci ./backend

      - name: "🐳 Build frontend image"
        run: docker build -t cloudapp-frontend:ci ./frontend

      - name: "✅ Build success"
        run: |
          echo "All Docker images built successfully!"
          docker images | grep cloudapp
