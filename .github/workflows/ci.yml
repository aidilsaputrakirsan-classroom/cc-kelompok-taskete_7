# ==============================================
# CI Pipeline — cc-kelompok-taskete_7 (Microservices)
# ==============================================
# Pipeline ini berjalan otomatis saat:
# - Push ke branch main
# - Pull Request ke branch main
#
# Jobs:
# 1. test-auth-service: pytest Auth Service
# 2. test-item-service: pytest Item Service (cuti)
# 3. test-backend: pytest monolith legacy (DeployCC)
# 4. test-frontend: vitest + build
# 5. integration-test: docker compose up → pytest tests/integration/
# 6. build-docker: Build image per service

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ================================
  # JOB 1: Test Auth Service
  # ================================
  test-auth-service:
    name: "🔐 Test Auth Service"
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: ci-test-secret-key

    defaults:
      run:
        working-directory: ./services/auth-service

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "📦 Cache pip (auth-service)"
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-auth-${{ hashFiles('services/auth-service/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-auth-

      - name: "📥 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: "🧪 Run Auth Service tests"
        run: pytest

  # ================================
  # JOB 2: Test Item Service
  # ================================
  test-item-service:
    name: "📦 Test Item Service"
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./test.db
      AUTH_SERVICE_URL: http://localhost:8001

    defaults:
      run:
        working-directory: ./services/item-service

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "📦 Cache pip (item-service)"
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-item-${{ hashFiles('services/item-service/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-item-

      - name: "📥 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: "🧪 Run Item Service tests"
        run: pytest

  # ================================
  # JOB 3: Test Backend Monolith (legacy / DeployCC)
  # ================================
  test-backend:
    name: "🐍 Test Backend"
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./test.db

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "📦 Cache pip (backend)"
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-backend-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-backend-

      - name: "📥 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "🧪 Run monolith tests"
        run: pytest

  # ================================
  # JOB 4: Test Frontend
  # ================================
  test-frontend:
    name: "⚛️ Test Frontend"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: "📥 Install dependencies"
        run: npm ci

      - name: "🧪 Run tests"
        run: npm test

      - name: "🏗️ Build frontend"
        run: npm run build

  # ================================
  # JOB 5: Integration Tests (Modul 13)
  # ================================
  integration-test:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - test-auth-service
      - test-item-service
      - test-backend
      - test-frontend

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "📥 Install integration test dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install httpx pytest

      - name: "🐳 Start all services"
        run: docker compose up -d --build --wait

      - name: "⏳ Wait for gateway and services"
        run: |
          echo "Waiting for services to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost/health > /dev/null; then
              echo "Gateway ready (attempt $i)"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost/health
          curl -sf http://localhost/auth/health
          curl -sf http://localhost/items/health

      - name: "🧪 Run integration tests"
        env:
          GATEWAY_URL: http://localhost
        run: pytest tests/integration/ -v --tb=short

      - name: "📋 Debug logs on failure"
        if: failure()
        run: |
          docker compose ps
          docker compose logs --tail=50

      - name: "🛑 Stop services"
        if: always()
        run: docker compose down -v --remove-orphans

  # ================================
  # JOB 6: Build Docker Images (per service)
  # ================================
  build-docker:
    name: "🐳 Build Docker"
    runs-on: ubuntu-latest
    needs:
      - test-auth-service
      - test-item-service
      - test-backend
      - test-frontend
      - integration-test

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🐳 Build auth-service image"
        run: docker build -t simcuti-auth-service:ci ./services/auth-service

      - name: "🐳 Build item-service image"
        run: docker build -t simcuti-item-service:ci ./services/item-service

      - name: "🐳 Build frontend image"
        run: docker build -t simcuti-frontend:ci ./frontend

      - name: "🐳 Build backend image (DeployCC legacy)"
        run: docker build -t simcuti-backend:ci ./backend

      - name: "✅ Validate docker-compose config"
        run: docker compose config --quiet

      - name: "✅ Build summary"
        run: |
          echo "All service images built successfully:"
          docker images | grep -E "simcuti-(auth|item|frontend|backend)"
