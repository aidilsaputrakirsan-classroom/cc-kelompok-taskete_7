# ============================================================
# SIMCUTI — Docker Compose Microservices
# ============================================================

services:

  # =====================================================
  # AUTH DATABASE
  # =====================================================
  auth-db:
    image: postgres:16-alpine
    container_name: simcuti-auth-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: auth_db

    volumes:
      - auth_db_data:/var/lib/postgresql/data

    networks:
      - simcuti-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  # =====================================================
  # CUTI DATABASE
  # =====================================================
  cuti-db:
    image: postgres:16-alpine
    container_name: simcuti-cuti-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: cuti_db

    volumes:
      - cuti_db_data:/var/lib/postgresql/data

    networks:
      - simcuti-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cuti_db"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  # =====================================================
  # AUTH SERVICE
  # =====================================================
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile

    container_name: simcuti-auth-service

    restart: unless-stopped

    environment:
      DATABASE_URL: postgresql://postgres:postgres123@auth-db:5432/auth_db
      SECRET_KEY: super-secret-key
      SERVICE_NAME: auth-service
      LOG_LEVEL: INFO

    ports:
      - "8001:8001"

    networks:
      - simcuti-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: auth-service

    depends_on:
      auth-db:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8001/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  # =====================================================
  # CUTI SERVICE (item-service)
  # =====================================================
  cuti-service:
    build:
      context: ./services/item-service
      dockerfile: Dockerfile

    container_name: simcuti-cuti-service

    restart: unless-stopped

    environment:
      DATABASE_URL: postgresql://postgres:postgres123@cuti-db:5432/cuti_db
      AUTH_SERVICE_URL: http://auth-service:8001
      SERVICE_NAME: item-service
      LOG_LEVEL: INFO

    ports:
      - "8002:8002"

    networks:
      - simcuti-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: item-service

    depends_on:
      cuti-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8002/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  # =====================================================
  # FRONTEND
  # =====================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: simcuti-frontend

    restart: unless-stopped

    environment:
      VITE_API_URL: http://localhost

    ports:
      - "3000:80"

    networks:
      - simcuti-network

    depends_on:
      - auth-service
      - cuti-service

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  # =====================================================
  # API GATEWAY (NGINX)
  # =====================================================
  gateway:
    image: nginx:alpine

    container_name: simcuti-gateway

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    networks:
      - simcuti-network

    depends_on:
      auth-service:
        condition: service_healthy
      cuti-service:
        condition: service_healthy
      frontend:
        condition: service_started

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

# =====================================================
# VOLUMES
# =====================================================
volumes:
  auth_db_data:
  cuti_db_data:

# =====================================================
# NETWORKS
# =====================================================
networks:
  simcuti-network:
    driver: bridge