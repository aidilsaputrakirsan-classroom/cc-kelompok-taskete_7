server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA (Single Page Application) routing
    # Semua path yang tidak ada file-nya → redirect ke index.html
    # Ini penting agar React Router tidak error 404 saat refresh/direct URL
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets agresif (hashed filenames — aman untuk long-cache)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Jangan cache index.html (agar update frontend langsung terasa)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Gzip compression untuk performa
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/xml+rss application/json
               image/svg+xml;
}
